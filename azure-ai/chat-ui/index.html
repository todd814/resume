<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Todd's Resume — AI Assistant</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:        #009688;
      --teal-dark:   #00796b;
      --teal-light:  #e0f2f1;
      --grey-bg:     #f5f5f5;
      --grey-border: #ddd;
      --text:        #333;
      --text-muted:  #757575;
      --white:       #fff;
      --bubble-user: #009688;
      --bubble-ai:   #fff;
      --error:       #d32f2f;
    }

    body {
      font-family: "Roboto", sans-serif;
      background: var(--grey-bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: var(--teal);
      color: var(--white);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
      flex-shrink: 0;
    }
    .header-avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--teal-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .header-text h1 { font-size: 1.05rem; font-weight: 700; }
    .header-text p  { font-size: 0.78rem; opacity: .85; margin-top: 2px; }
    .header-links   { margin-left: auto; display: flex; gap: 10px; }
    .header-links a {
      color: var(--white);
      font-size: 0.78rem;
      text-decoration: none;
      opacity: .85;
      white-space: nowrap;
    }
    .header-links a:hover { opacity: 1; text-decoration: underline; }

    /* ── Chat window ── */
    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ── Messages ── */
    .message {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 80%;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .message.user  { align-self: flex-end; flex-direction: row-reverse; }
    .message.ai    { align-self: flex-start; }

    .avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      background: var(--teal-light);
    }
    .message.user .avatar { background: var(--teal); color: var(--white); }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      line-height: 1.55;
      font-size: 0.92rem;
      max-width: 100%;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--bubble-user);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }
    .message.ai .bubble {
      background: var(--bubble-ai);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .message.error .bubble {
      background: #ffebee;
      color: var(--error);
      border: 1px solid #ffcdd2;
    }

    /* ── Typing indicator ── */
    .typing-indicator { display: flex; gap: 4px; padding: 6px 4px; }
    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--teal);
      animation: bounce .9s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .15s; }
    .typing-indicator span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30%            { transform: translateY(-8px); }
    }

    /* ── Suggested questions ── */
    #suggestions {
      padding: 0 16px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      flex-shrink: 0;
    }
    .suggestion-label {
      width: 100%;
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .suggestion-btn {
      background: var(--white);
      border: 1px solid var(--teal);
      color: var(--teal);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background .15s, color .15s;
      font-family: inherit;
    }
    .suggestion-btn:hover {
      background: var(--teal);
      color: var(--white);
    }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: var(--white);
      border-top: 1px solid var(--grey-border);
      flex-shrink: 0;
    }
    #question-input {
      flex: 1;
      border: 1px solid var(--grey-border);
      border-radius: 24px;
      padding: 10px 16px;
      font-size: 0.92rem;
      font-family: inherit;
      outline: none;
      transition: border-color .2s;
      resize: none;
      max-height: 100px;
      overflow-y: auto;
    }
    #question-input:focus { border-color: var(--teal); }
    #send-btn {
      background: var(--teal);
      color: var(--white);
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .15s;
    }
    #send-btn:hover:not(:disabled)    { background: var(--teal-dark); }
    #send-btn:disabled { opacity: .5; cursor: default; }

    /* ── Rate limit counter ── */
    #rate-counter {
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding: 4px 16px 0;
      flex-shrink: 0;
    }
    #rate-counter.warn  { color: #e65100; }
    #rate-counter.limit { color: var(--error); font-weight: 500; }

    /* ── Footer ── */
    footer {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-muted);
      padding: 6px;
      background: var(--grey-bg);
      flex-shrink: 0;
    }
    footer a { color: var(--teal); text-decoration: none; }

    @media (max-width: 480px) {
      .message { max-width: 95%; }
      .header-links { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-avatar">🤖</div>
  <div class="header-text">
    <h1>Ask Todd's Resume</h1>
    <p>Powered by Azure OpenAI + Azure AI Search</p>
  </div>
  <div class="header-links">
    <a href="https://resume.devious.one" target="_blank">View Resume</a>
    <a href="https://www.linkedin.com/in/todd-deblieck-53b13b13/" target="_blank">LinkedIn</a>
    <a href="https://github.com/todd814/resume" target="_blank">GitHub</a>
  </div>
</header>

<div id="chat-window">
  <!-- Welcome message injected by JS -->
</div>

<div id="suggestions">
  <span class="suggestion-label">Try asking:</span>
</div>

<div id="input-bar">
  <textarea id="question-input" placeholder="Ask me anything about Todd's background…" rows="1"></textarea>
  <button id="send-btn" aria-label="Send" title="Send">&#9658;</button>
</div>

<div id="rate-counter"></div>

<footer>
  Answers are generated by AI from resume content. &nbsp;|&nbsp;
  Built with <a href="https://azure.microsoft.com/en-us/products/ai-services/openai-service" target="_blank">Azure OpenAI</a>,
  <a href="https://azure.microsoft.com/en-us/products/ai-services/ai-search" target="_blank">Azure AI Search</a> &amp;
  <a href="https://www.terraform.io/" target="_blank">Terraform</a>
</footer>

<script>
  // ── Configuration ───────────────────────────────────────────────────────────
  const FUNCTION_URL  = "https://resumeai-app.lemontree-3428e352.eastus2.azurecontainerapps.io/api/ask";
  const DAILY_LIMIT   = 10;
  const STORAGE_KEY   = "resumeai_usage";

  const SUGGESTED_QUESTIONS = [
    "What is Todd's most recent role?",
    "What AWS services has Todd worked with?",
    "Tell me about his Cosmos Administrator experience.",
    "What AI tools and platforms does Todd use?",
    "Describe Todd's military background.",
    "What certifications does Todd hold?",
  ];

  const WELCOME_MESSAGE = `Hi! I'm an AI assistant trained on Todd DeBlieck's resume. \
I can answer questions about his experience, skills, certifications, and projects.\n\nWhat would you like to know?`;

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const chatWindow   = document.getElementById("chat-window");
  const suggestions  = document.getElementById("suggestions");
  const input        = document.getElementById("question-input");
  const sendBtn      = document.getElementById("send-btn");
  const rateCounter  = document.getElementById("rate-counter");

  // ── Rate limit (localStorage) ───────────────────────────────────────────────
  function todayKey() {
    return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
  }

  function getUsage() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return { date: todayKey(), count: 0 };
      const data = JSON.parse(raw);
      if (data.date !== todayKey()) return { date: todayKey(), count: 0 };
      return data;
    } catch { return { date: todayKey(), count: 0 }; }
  }

  function incrementUsage() {
    const usage = getUsage();
    usage.count += 1;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(usage));
    return usage.count;
  }

  function syncUsage(serverRemaining) {
    // Trust server remaining if provided — keeps client in sync after refreshes
    const used = DAILY_LIMIT - serverRemaining;
    const usage = { date: todayKey(), count: used };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(usage));
    updateCounter(used);
  }

  function updateCounter(used) {
    const remaining = DAILY_LIMIT - used;
    if (remaining <= 0) {
      rateCounter.textContent = "Daily limit reached (10/10). Come back tomorrow!";
      rateCounter.className = "limit";
      setInputLocked(true);
    } else if (remaining <= 3) {
      rateCounter.textContent = `${used} of ${DAILY_LIMIT} questions used today (${remaining} remaining)`;
      rateCounter.className = "warn";
    } else {
      rateCounter.textContent = `${used} of ${DAILY_LIMIT} questions used today`;
      rateCounter.className = "";
    }
  }

  function setInputLocked(locked) {
    input.disabled  = locked;
    sendBtn.disabled = locked;
    if (locked) input.placeholder = "Daily limit reached. Come back tomorrow!";
  }

  // ── Helpers ─────────────────────────────────────────────────────────────────
  function appendMessage(text, role) {
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "👤" : "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatWindow.appendChild(wrapper);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return wrapper;
  }

  function appendTypingIndicator() {
    const wrapper = document.createElement("div");
    wrapper.className = "message ai";
    wrapper.id = "typing";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🤖";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatWindow.appendChild(wrapper);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function removeTypingIndicator() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  function appendStreamBubble() {
    const wrapper = document.createElement("div");
    wrapper.className = "message ai";
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "🤖";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    chatWindow.appendChild(wrapper);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  function setLoading(loading) {
    sendBtn.disabled = loading;
    input.disabled   = loading;
  }

  // ── Suggestions ─────────────────────────────────────────────────────────────
  function buildSuggestions() {
    SUGGESTED_QUESTIONS.forEach(q => {
      const btn = document.createElement("button");
      btn.className = "suggestion-btn";
      btn.textContent = q;
      btn.addEventListener("click", () => {
        suggestions.style.display = "none";
        sendQuestion(q);
      });
      suggestions.appendChild(btn);
    });
  }

  // ── Warm-up ping ─────────────────────────────────────────────────────────────
  // Container App scales to zero. Fire a health check immediately on page load
  // so the container is warm by the time the user sends their first question.
  let _containerReady = false;
  function warmUp() {
    fetch(FUNCTION_URL.replace('/api/ask', '/api/health'), { method: 'GET' })
      .then(() => { _containerReady = true; })
      .catch(() => { /* silent — container will still accept requests */ });
  }

  // ── Core send logic ──────────────────────────────────────────────────────────
  async function sendQuestion(question) {
    if (!question.trim()) return;

    // Client-side limit check before hitting the server
    const usage = getUsage();
    if (usage.count >= DAILY_LIMIT) {
      updateCounter(usage.count);
      return;
    }

    appendMessage(question, "user");
    input.value = "";
    input.style.height = "auto";
    suggestions.style.display = "none";
    setLoading(true);
    appendTypingIndicator();

    const controller = new AbortController();
    const timeoutId  = setTimeout(() => controller.abort(), 45000); // 45s hard timeout

    let res;
    try {
      res = await fetch(FUNCTION_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
        signal: controller.signal,
      });
    } catch (err) {
      clearTimeout(timeoutId);
      removeTypingIndicator();
      const msg = err.name === "AbortError"
        ? "The AI took too long to respond. The service may be warming up — please try again in a moment."
        : "Unable to reach the AI service. Please check your connection and try again.";
      appendMessage(msg, "error");
      setLoading(false);
      return;
    }
    clearTimeout(timeoutId);

    if (res.status === 429) {
      removeTypingIndicator();
      updateCounter(DAILY_LIMIT);
      appendMessage("You've reached the daily limit of 10 questions. Come back tomorrow!", "error");
      setLoading(false);
      return;
    }

    if (!res.ok) {
      removeTypingIndicator();
      const err = await res.json().catch(() => ({}));
      appendMessage(err.error || "Something went wrong. Please try again.", "error");
      setLoading(false);
      return;
    }

    const data = await res.json();
    removeTypingIndicator();
    appendMessage(data.answer, "ai");
    if (typeof data.remaining === "number") syncUsage(data.remaining);
    else updateCounter(incrementUsage());
    setLoading(false);
  }

  // ── Event listeners ──────────────────────────────────────────────────────────
  sendBtn.addEventListener("click", () => sendQuestion(input.value));

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendQuestion(input.value);
    }
  });

  // Auto-grow textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 100) + "px";
  });

  // ── Init ─────────────────────────────────────────────────────────────────────
  warmUp();
  const initialUsage = getUsage();
  updateCounter(initialUsage.count);
  appendMessage(WELCOME_MESSAGE, "ai");
  buildSuggestions();
  input.focus();
</script>
</body>
</html>
